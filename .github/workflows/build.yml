name: Java CI with Gradle

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['master']
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout effortless
        uses: actions/checkout@v4
        with:
          path: effortless

      # The author's private Maven (repo.huskuraft.dev) is permanently down, so the
      # build dependencies are rebuilt from their open-source tags instead of fetched.
      - name: Checkout universal-gradle-plugin @ v0.2.0
        uses: actions/checkout@v4
        with:
          repository: huskuraft/universal-gradle-plugin
          ref: v0.2.0
          path: universal-gradle-plugin

      - name: Checkout universal-api @ v0.1.0
        uses: actions/checkout@v4
        with:
          repository: huskuraft/universal-api
          ref: v0.1.0
          path: universal-api

      - name: Setup JDKs
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'zulu'
          cache: 'gradle'

      - name: Publish dev.huskuraft.universal plugin 0.2.0 to mavenLocal
        working-directory: universal-gradle-plugin
        run: |
          chmod +x ./gradlew
          ./gradlew publishToMavenLocal --no-daemon --stacktrace

      - name: Publish universal-api 0.1.0 to mavenLocal
        working-directory: universal-api
        run: |
          # v0.1.0 pins NeoGradle 'net.neoforged.gradle.userdev' "7.0.+", which now
          # resolves to a build requiring Gradle >= 8.13; its wrapper ships 8.11. Bump it.
          sed -i 's|gradle-8.11-bin.zip|gradle-8.13-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          # scope to Minecraft 1.21.1 (all four loaders) so the full universal jar can
          # be built; see .github/ci/universal-api.settings.gradle.
          cp ../effortless/.github/ci/universal-api.settings.gradle settings.gradle
          chmod +x ./gradlew
          ./gradlew publishToMavenLocal --no-daemon --stacktrace

      # Incremental restore: build the full 1.21.1 universal jar (all four loaders)
      # first; widen this map to the other Minecraft versions once 1.21.1 is green.
      - name: Scope target matrix to Minecraft 1.21.1 (all loaders)
        working-directory: effortless
        run: |
          python3 - <<'PY'
          import re
          path = 'build.gradle'
          src = open(path).read()
          out = re.sub(r"\[\s*'1\.17\.1'.*?\]\.forEach",
                       "['1.21.1': ['fabric-api', 'quilt-api', 'forge-api', 'neoforge-api']].forEach",
                       src, flags=re.S)
          assert out != src, "target-matrix scope did not match build.gradle"
          open(path, 'w').write(out)
          PY
          grep -n "universalTarget\|1.21.1" build.gradle

      - name: Build effortless (Minecraft 1.21.1 universal jar)
        working-directory: effortless
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload built jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: effortless-1.21.1-jars
          path: |
            effortless/build/libs/*.jar
            effortless/build/devlibs/*.jar
          if-no-files-found: warn
