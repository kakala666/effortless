name: Java CI with Gradle

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['master']
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout effortless
        uses: actions/checkout@v4
        with:
          path: effortless

      # The author's private Maven (repo.huskuraft.dev) is permanently down, so the
      # build dependencies are rebuilt from their open-source tags instead of fetched.
      - name: Checkout universal-gradle-plugin @ v0.2.0
        uses: actions/checkout@v4
        with:
          repository: huskuraft/universal-gradle-plugin
          ref: v0.2.0
          path: universal-gradle-plugin

      - name: Checkout universal-api @ v0.1.0
        uses: actions/checkout@v4
        with:
          repository: huskuraft/universal-api
          ref: v0.1.0
          path: universal-api

      - name: Setup JDKs
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'zulu'
          cache: 'gradle'

      - name: Publish dev.huskuraft.universal plugin 0.2.0 to mavenLocal
        working-directory: universal-gradle-plugin
        run: |
          # Fix the plugin's inverted per-target config guard: `findByName(...) != null`
          # should be `== null` (configure on first creation). As written, per-target
          # config — including JarModificationTask.inputFile — only runs from the 2nd
          # loader onward, so a single-loader (NeoForge-only) build leaves transformJar
          # unconfigured and fails. The author never hit this (every version had >=3 loaders).
          sed -i \
            -e 's/findByName(shadowJarTargetVersionCode) != null/findByName(shadowJarTargetVersionCode) == null/' \
            -e 's/findByName(transformJarTargetVersionCode) != null/findByName(transformJarTargetVersionCode) == null/' \
            src/main/groovy/dev/huskuraft/universal/gradle/UniversalPlugin.groovy
          grep -n 'findByName(.*VersionCode)' src/main/groovy/dev/huskuraft/universal/gradle/UniversalPlugin.groovy
          chmod +x ./gradlew
          ./gradlew publishToMavenLocal --no-daemon --stacktrace

      - name: Publish universal-api 0.1.0 to mavenLocal
        working-directory: universal-api
        run: |
          # v0.1.0 pins NeoGradle 'net.neoforged.gradle.userdev' "7.0.+", which now
          # resolves to a build requiring Gradle >= 8.13; its wrapper ships 8.11. Bump it.
          sed -i 's|gradle-8.11-bin.zip|gradle-8.13-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          # NeoForge-only: build common-api + neoforge-api:v3955 (= 1.21.1).
          cp ../effortless/.github/ci/universal-api.settings.gradle settings.gradle
          chmod +x ./gradlew
          ./gradlew :common-api:publishToMavenLocal :neoforge-api:v3955:publishToMavenLocal --no-daemon --stacktrace

      # NeoForge-only: scope the target matrix to NeoForge 1.21.1.
      - name: Scope target matrix to NeoForge 1.21.1
        working-directory: effortless
        run: |
          python3 - <<'PY'
          import re
          path = 'build.gradle'
          src = open(path).read()
          out = re.sub(r"\[\s*'1\.17\.1'.*?\]\.forEach",
                       "['1.21.1': ['neoforge-api']].forEach", src, flags=re.S)
          assert out != src, "target-matrix scope did not match build.gradle"
          open(path, 'w').write(out)
          PY
          grep -n "universalTarget\|1.21.1" build.gradle

      - name: Build effortless (NeoForge 1.21.1 jar)
        working-directory: effortless
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload built jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: effortless-1.21.1-jars
          path: |
            effortless/build/libs/*.jar
            effortless/build/devlibs/*.jar
          if-no-files-found: warn
